<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShopKart — E-Commerce Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f8f7f4;--white:#ffffff;--text:#1a1a1a;--muted:#888;--border:#e8e8e8;--accent:#e8471e;--accent2:#1a1a1a;--card:#fff;--tag:#f0ede8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;}

/* NAV */
nav{background:#fff;border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-logo{font-size:1.4rem;font-weight:800;letter-spacing:-.03em;}
.nav-logo span{color:var(--accent);}
.nav-links{display:flex;gap:1.5rem;list-style:none;}
.nav-links a{text-decoration:none;color:var(--muted);font-size:.9rem;font-weight:500;transition:.2s;}
.nav-links a:hover{color:var(--text);}
.nav-right{display:flex;align-items:center;gap:1rem;}
.search-box{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:50px;padding:.5rem 1rem;gap:.5rem;}
.search-box input{border:none;background:transparent;outline:none;font-size:.85rem;font-family:inherit;width:160px;}
.cart-btn{position:relative;background:var(--accent2);color:#fff;border:none;border-radius:50px;padding:.6rem 1.2rem;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:.4rem;}
.cart-count{background:var(--accent);color:#fff;border-radius:50%;width:18px;height:18px;font-size:.65rem;display:flex;align-items:center;justify-content:center;font-weight:700;}

/* HERO BANNER */
.hero-banner{background:var(--accent2);color:#fff;padding:4rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:2rem;max-width:100%;}
.hero-text h1{font-size:clamp(2rem,4vw,3.5rem);font-weight:800;line-height:1.1;letter-spacing:-.03em;margin-bottom:1rem;}
.hero-text h1 span{color:var(--accent);}
.hero-text p{color:rgba(255,255,255,.6);font-size:1rem;margin-bottom:1.5rem;}
.hero-cta{background:var(--accent);color:#fff;border:none;padding:.9rem 2rem;border-radius:50px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:inherit;}
.hero-badge{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:2rem;text-align:center;min-width:180px;}
.hero-badge .big{font-size:3rem;font-weight:800;line-height:1;}
.hero-badge .sm{font-size:.8rem;color:rgba(255,255,255,.5);margin-top:.25rem;}

/* FILTERS */
.filters{padding:1.5rem 2rem;display:flex;gap:.75rem;flex-wrap:wrap;border-bottom:1px solid var(--border);background:#fff;}
.filter-btn{background:var(--tag);border:none;padding:.5rem 1.1rem;border-radius:50px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s;color:var(--text);}
.filter-btn.active,.filter-btn:hover{background:var(--accent2);color:#fff;}

/* PRODUCTS */
.products-section{padding:2rem;}
.products-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
.products-header h2{font-size:1.2rem;font-weight:700;}
.products-header span{font-size:.85rem;color:var(--muted);}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.25rem;}
.product-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:.2s;cursor:pointer;}
.product-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.08);}
.product-img{height:200px;display:flex;align-items:center;justify-content:center;font-size:4rem;background:var(--bg);}
.product-body{padding:1rem;}
.product-tag{font-size:.7rem;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem;}
.product-name{font-size:.95rem;font-weight:600;margin-bottom:.3rem;line-height:1.3;}
.product-rating{display:flex;align-items:center;gap:.3rem;margin-bottom:.6rem;}
.stars{color:#f59e0b;font-size:.8rem;}
.rating-count{font-size:.75rem;color:var(--muted);}
.product-footer{display:flex;align-items:center;justify-content:space-between;}
.product-price{font-size:1.1rem;font-weight:800;}
.add-btn{background:var(--accent2);color:#fff;border:none;border-radius:50px;padding:.4rem 1rem;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s;}
.add-btn:hover{background:var(--accent);}
.badge-new{background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:50px;margin-left:.4rem;vertical-align:middle;}

/* CART PANEL */
.cart-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;backdrop-filter:blur(4px);}
.cart-overlay.open{display:block;}
.cart-panel{position:fixed;right:0;top:0;bottom:0;width:380px;background:#fff;z-index:201;padding:1.5rem;overflow-y:auto;display:flex;flex-direction:column;transform:translateX(100%);transition:.3s;}
.cart-panel.open{transform:translateX(0);}
.cart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
.cart-header h2{font-size:1.2rem;font-weight:700;}
.close-btn{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--muted);}
.cart-items{flex:1;}
.cart-item{display:flex;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--border);align-items:center;}
.cart-item-img{width:60px;height:60px;background:var(--bg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0;}
.cart-item-info{flex:1;}
.cart-item-name{font-size:.9rem;font-weight:600;margin-bottom:.2rem;}
.cart-item-price{font-size:.85rem;color:var(--accent);font-weight:700;}
.qty-controls{display:flex;align-items:center;gap:.5rem;margin-top:.4rem;}
.qty-btn{background:var(--bg);border:1px solid var(--border);width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;}
.qty-num{font-size:.85rem;font-weight:600;}
.remove-btn{color:var(--muted);background:none;border:none;cursor:pointer;font-size:1rem;}
.cart-footer{border-top:1px solid var(--border);padding-top:1rem;margin-top:1rem;}
.cart-total{display:flex;justify-content:space-between;font-size:1rem;font-weight:700;margin-bottom:1rem;}
.checkout-btn{width:100%;background:var(--accent);color:#fff;border:none;padding:1rem;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;}
.empty-cart{text-align:center;padding:3rem 0;color:var(--muted);}
.empty-cart .big-icon{font-size:3rem;margin-bottom:1rem;}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--accent2);color:#fff;padding:.8rem 1.5rem;border-radius:50px;font-size:.9rem;font-weight:500;z-index:300;opacity:0;transition:.3s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">Shop<span>Kart</span></div>
  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">Electronics</a></li>
    <li><a href="#">Fashion</a></li>
    <li><a href="#">Deals</a></li>
  </ul>
  <div class="nav-right">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="Search products..." oninput="filterProducts()"/>
    </div>
    <button class="cart-btn" onclick="toggleCart()">
      🛒 Cart <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</nav>

<!-- HERO -->
<div class="hero-banner">
  <div class="hero-text">
    <h1>Shop Smart,<br/>Live <span>Better</span></h1>
    <p>Discover thousands of products at unbeatable prices. Fast delivery, easy returns.</p>
    <button class="hero-cta">Shop Now →</button>
  </div>
  <div class="hero-badge">
    <div class="big">500+</div>
    <div class="sm">Products Available</div>
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('electronics',this)">Electronics</button>
  <button class="filter-btn" onclick="setFilter('fashion',this)">Fashion</button>
  <button class="filter-btn" onclick="setFilter('home',this)">Home & Living</button>
  <button class="filter-btn" onclick="setFilter('sports',this)">Sports</button>
  <button class="filter-btn" onclick="setFilter('books',this)">Books</button>
</div>

<!-- PRODUCTS -->
<div class="products-section">
  <div class="products-header">
    <h2>Featured Products</h2>
    <span id="productCount">12 products</span>
  </div>
  <div class="products-grid" id="productsGrid"></div>
</div>

<!-- CART -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h2>Your Cart</h2>
    <button class="close-btn" onclick="toggleCart()">×</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="cart-total"><span>Total</span><span id="cartTotal">₹0</span></div>
    <button class="checkout-btn" onclick="checkout()">Proceed to Checkout →</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const PRODUCTS=[
  {id:1,name:'Wireless Noise-Cancelling Headphones',category:'electronics',price:4999,emoji:'🎧',rating:4.5,reviews:234,tag:'Electronics',isNew:true},
  {id:2,name:'Smart Fitness Watch',category:'electronics',price:8999,emoji:'⌚',rating:4.7,reviews:189,tag:'Electronics',isNew:false},
  {id:3,name:'Mechanical Keyboard',category:'electronics',price:3499,emoji:'⌨️',rating:4.3,reviews:156,tag:'Electronics',isNew:false},
  {id:4,name:'Casual Cotton T-Shirt',category:'fashion',price:699,emoji:'👕',rating:4.2,reviews:445,tag:'Fashion',isNew:false},
  {id:5,name:'Running Sneakers Pro',category:'fashion',price:2999,emoji:'👟',rating:4.6,reviews:312,tag:'Fashion',isNew:true},
  {id:6,name:'Leather Crossbody Bag',category:'fashion',price:1899,emoji:'👜',rating:4.4,reviews:98,tag:'Fashion',isNew:false},
  {id:7,name:'Ceramic Coffee Mug Set',category:'home',price:849,emoji:'☕',rating:4.8,reviews:567,tag:'Home & Living',isNew:false},
  {id:8,name:'Scented Candle Collection',category:'home',price:1299,emoji:'🕯️',rating:4.9,reviews:203,tag:'Home & Living',isNew:true},
  {id:9,name:'Yoga Mat Premium',category:'sports',price:1599,emoji:'🧘',rating:4.5,reviews:178,tag:'Sports',isNew:false},
  {id:10,name:'Dumbbells Set 10kg',category:'sports',price:2499,emoji:'🏋️',rating:4.3,reviews:89,tag:'Sports',isNew:false},
  {id:11,name:'Atomic Habits',category:'books',price:399,emoji:'📚',rating:4.9,reviews:1204,tag:'Books',isNew:false},
  {id:12,name:'Deep Work',category:'books',price:349,emoji:'📖',rating:4.7,reviews:876,tag:'Books',isNew:false},
];

let cart={};
let currentFilter='all';
let searchTerm='';

function renderProducts(){
  const filtered=PRODUCTS.filter(p=>{
    const matchCat=currentFilter==='all'||p.category===currentFilter;
    const matchSearch=p.name.toLowerCase().includes(searchTerm.toLowerCase());
    return matchCat&&matchSearch;
  });
  document.getElementById('productCount').textContent=filtered.length+' products';
  document.getElementById('productsGrid').innerHTML=filtered.map(p=>`
    <div class="product-card">
      <div class="product-img">${p.emoji}</div>
      <div class="product-body">
        <div class="product-tag">${p.tag}${p.isNew?'<span class="badge-new">NEW</span>':''}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-rating">
          <span class="stars">${'★'.repeat(Math.floor(p.rating))}${'☆'.repeat(5-Math.floor(p.rating))}</span>
          <span class="rating-count">(${p.reviews})</span>
        </div>
        <div class="product-footer">
          <div class="product-price">₹${p.price.toLocaleString()}</div>
          <button class="add-btn" onclick="addToCart(${p.id})">Add to Cart</button>
        </div>
      </div>
    </div>`).join('');
}

function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderProducts();
}

function filterProducts(){
  searchTerm=document.getElementById('searchInput').value;
  renderProducts();
}

function addToCart(id){
  cart[id]=(cart[id]||0)+1;
  updateCartUI();
  showToast('Added to cart!');
}

function updateCartUI(){
  const total=Object.values(cart).reduce((a,b)=>a+b,0);
  document.getElementById('cartCount').textContent=total;
  renderCartItems();
}

function renderCartItems(){
  const items=Object.entries(cart).filter(([,q])=>q>0);
  const el=document.getElementById('cartItems');
  const footer=document.getElementById('cartFooter');
  if(items.length===0){
    el.innerHTML='<div class="empty-cart"><div class="big-icon">🛒</div><div>Your cart is empty</div></div>';
    footer.style.display='none';
    return;
  }
  footer.style.display='block';
  let grandTotal=0;
  el.innerHTML=items.map(([id,qty])=>{
    const p=PRODUCTS.find(x=>x.id==id);
    grandTotal+=p.price*qty;
    return `<div class="cart-item">
      <div class="cart-item-img">${p.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${p.name}</div>
        <div class="cart-item-price">₹${(p.price*qty).toLocaleString()}</div>
        <div class="qty-controls">
          <button class="qty-btn" onclick="changeQty(${id},-1)">−</button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn" onclick="changeQty(${id},1)">+</button>
        </div>
      </div>
      <button class="remove-btn" onclick="removeItem(${id})">🗑</button>
    </div>`;
  }).join('');
  document.getElementById('cartTotal').textContent='₹'+grandTotal.toLocaleString();
}

function changeQty(id,delta){
  cart[id]=(cart[id]||0)+delta;
  if(cart[id]<=0)delete cart[id];
  updateCartUI();
}
function removeItem(id){delete cart[id];updateCartUI();}
function toggleCart(){
  document.getElementById('cartOverlay').classList.toggle('open');
  document.getElementById('cartPanel').classList.toggle('open');
}
function checkout(){
  cart={};
  updateCartUI();
  toggleCart();
  showToast('🎉 Order placed successfully!');
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
renderProducts();
</script>
</body>
</html>
